# Hindsight configuration

[supermemory]
base_url = "http://localhost:6767"
# API key is read from the SUPERMEMORY_API_KEY env var or .env file
container_tag = "hindsight"

[capture]
poll_interval_seconds = 2.0     # foreground window poll
min_focus_seconds = 4           # ignore windows focused less than this
batch_flush_seconds = 30        # max time an event waits before ingestion
clipboard = true
windows = true
browser_history = true
browser_sync_minutes = 5
# Screenshot OCR (opt-in, more invasive). On each new sustained window, run the
# on-device Windows OCR engine and store the recognized text. Requires the
# winrt + Pillow packages. The screenshot itself is never stored.
ocr = false
ocr_min_interval_seconds = 20

[privacy]
# Windows whose title or process matches any entry are NEVER captured.
excluded_processes = [
    "KeePass.exe", "1Password.exe", "Bitwarden.exe", "ProtonPass.exe",
]
excluded_title_keywords = [
    "InPrivate", "Incognito", "Private Browsing", "password", "passphrase",
]
# Clipboard entries matching these patterns are dropped (secrets).
clipboard_deny_patterns = [
    "^sm_",                     # supermemory api keys :)
    "^sk-",                     # openai-style keys
    "^ghp_", "^github_pat_",    # github tokens
    "^AKIA",                    # aws access keys
    "-----BEGIN .*PRIVATE KEY",
]
max_clipboard_chars = 2000

[answer]
# Local answer engine. Tries Ollama first, falls back to extractive summary.
ollama_url = "http://localhost:11434"
ollama_model = "qwen2.5:3b-instruct"
# Max seconds to wait for the local LLM before falling back to an instant
# extractive answer. Keeps the UI responsive when the GPU is busy.
timeout_seconds = 12

[memory]
# entityContext sent with every document to anchor Supermemory's memory agent
# so it records grounded facts about the user's activity and never invents.
entity_context = "These are personal-computer activity records for one user. Each document states one concrete thing the user viewed, opened, copied, or did, with the app or website and the time. Extract exactly one concise factual memory that restates what the user did, using only facts present in the text. Never invent people, places, purchases, events, or preferences."

[app]
host = "127.0.0.1"
port = 8787
