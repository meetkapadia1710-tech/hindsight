<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="Google Sans, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8ab4f8"/><stop offset="1" stop-color="#c58af9"/>
    </linearGradient>
    <linearGradient id="send" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8ab4f8"/><stop offset="1" stop-color="#4f9ef8"/>
    </linearGradient>
    <linearGradient id="userav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c58af9"/><stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="820" height="560" rx="16" fill="#0d0f1a"/>

  <!-- header -->
  <text x="28" y="46" font-size="22" font-weight="700" fill="#ffffff">Hind<tspan fill="url(#brand)">sight</tspan></text>
  <text x="152" y="45" font-size="12.5" fill="rgba(255,255,255,0.62)">your PC's memory · stays on your PC</text>
  <text x="468" y="45" font-size="12" fill="rgba(255,255,255,0.62)">30 memories remembered</text>
  <rect x="626" y="29" width="166" height="28" rx="14" fill="rgba(129,201,149,0.08)" stroke="rgba(129,201,149,0.35)"/>
  <circle cx="645" cy="43" r="4" fill="#81c995"/>
  <text x="657" y="47" font-size="11.5" fill="#81c995">Local · Offline-capable</text>
  <line x1="0" y1="72" x2="820" y2="72" stroke="rgba(255,255,255,0.10)"/>

  <!-- user message -->
  <circle cx="44" cy="112" r="16" fill="url(#userav)"/>
  <text x="36" y="118" font-size="14">🧑</text>
  <rect x="72" y="96" width="718" height="46" rx="14" fill="#1e2038"/>
  <text x="92" y="124" font-size="14.5" fill="rgba(255,255,255,0.92)">What was I reading about Microsoft Recall?</text>

  <!-- ai message -->
  <circle cx="44" cy="176" r="16" fill="url(#send)"/>
  <circle cx="44" cy="176" r="19" fill="none" stroke="rgba(138,180,248,0.18)" stroke-width="3"/>
  <text x="36" y="182" font-size="13">🧠</text>
  <rect x="72" y="158" width="718" height="156" rx="14" fill="#181a2e"/>
  <rect x="72" y="164" width="3" height="144" rx="1.5" fill="rgba(138,180,248,0.35)"/>
  <text x="92" y="190" font-size="14.5" fill="rgba(255,255,255,0.92)">You were reading "How Microsoft Recall stores screenshots" on Ars</text>
  <text x="92" y="212" font-size="14.5" fill="rgba(255,255,255,0.92)">Technica in Firefox.</text>
  <text x="92" y="236" font-size="11.5" fill="rgba(255,255,255,0.38)">answered by qwen2.5:3b-instruct · running locally</text>

  <line x1="92" y1="252" x2="770" y2="252" stroke="rgba(255,255,255,0.10)"/>
  <text x="92" y="274" font-size="10.5" letter-spacing="1.8" fill="rgba(255,255,255,0.38)">EVIDENCE · 1 MATCHING MEMORY</text>

  <!-- evidence row -->
  <circle cx="99" cy="294" r="3.5" fill="#57bb78"/>
  <text x="112" y="299" font-size="13.5" fill="rgba(255,255,255,0.92)">How Microsoft Recall stores screenshots — Ars Technica</text>
  <rect x="688" y="291" width="40" height="3" rx="1.5" fill="rgba(255,255,255,0.10)"/>
  <rect x="688" y="291" width="29" height="3" rx="1.5" fill="#8ab4f8"/>
  <text x="738" y="297" font-size="10.5" fill="rgba(255,255,255,0.62)">72%</text>

  <!-- caption -->
  <text x="28" y="420" font-size="12" fill="rgba(255,255,255,0.62)">Embeddings, storage, search &amp; the language model all run on localhost — turn off Wi-Fi and it still answers.</text>

  <!-- scope chips -->
  <rect x="28" y="442" width="76" height="30" rx="15" fill="rgba(138,180,248,0.16)" stroke="#8ab4f8"/>
  <text x="45" y="461" font-size="12" font-weight="600" fill="#8ab4f8">All time</text>
  <rect x="112" y="442" width="62" height="30" rx="15" fill="none" stroke="rgba(255,255,255,0.14)"/>
  <text x="128" y="461" font-size="12" fill="rgba(255,255,255,0.62)">Today</text>
  <rect x="182" y="442" width="84" height="30" rx="15" fill="none" stroke="rgba(255,255,255,0.14)"/>
  <text x="198" y="461" font-size="12" fill="rgba(255,255,255,0.62)">Yesterday</text>
  <rect x="274" y="442" width="84" height="30" rx="15" fill="none" stroke="rgba(255,255,255,0.14)"/>
  <text x="290" y="461" font-size="12" fill="rgba(255,255,255,0.62)">This week</text>

  <!-- composer -->
  <rect x="28" y="486" width="650" height="48" rx="24" fill="#1e2038" stroke="rgba(255,255,255,0.11)"/>
  <text x="50" y="515" font-size="14" fill="rgba(255,255,255,0.38)">Ask about anything you've done on this machine…</text>
  <rect x="690" y="487" width="102" height="46" rx="23" fill="url(#send)"/>
  <path d="M712 516 l5 -6 -5 -6 12 6 z" fill="#001d35"/>
  <text x="730" y="514" font-size="12.5" font-weight="700" letter-spacing="0.6" fill="#001d35">RECALL</text>
</svg>
