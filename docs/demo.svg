<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b9dff"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b9dff"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>

  <rect width="820" height="540" rx="14" fill="#0b0d10"/>

  <!-- header -->
  <text x="28" y="46" font-size="22" font-weight="700" fill="#e8ecf1">Hind<tspan fill="url(#brand)">sight</tspan></text>
  <text x="150" y="45" font-size="12.5" fill="#8a94a3">your PC's memory · stays on your PC</text>
  <text x="470" y="45" font-size="12" fill="#8a94a3">30 memories remembered</text>
  <rect x="628" y="30" width="164" height="26" rx="13" fill="#0f1a16" stroke="#1f3a2e"/>
  <circle cx="646" cy="43" r="4" fill="#37d39b"/>
  <text x="658" y="47" font-size="11.5" fill="#37d39b">Local · Offline-capable</text>
  <line x1="0" y1="72" x2="820" y2="72" stroke="#262c34"/>

  <!-- user bubble -->
  <rect x="70" y="96" width="720" height="46" rx="12" fill="#1b2027" stroke="#262c34"/>
  <rect x="28" y="96" width="30" height="30" rx="8" fill="#1b2027"/>
  <text x="36" y="117" font-size="15">🧑</text>
  <text x="88" y="124" font-size="14.5" fill="#e8ecf1">What was I reading about Microsoft Recall?</text>

  <!-- ai bubble -->
  <rect x="28" y="158" width="30" height="30" rx="8" fill="url(#brand)"/>
  <text x="36" y="179" font-size="14">🧠</text>
  <rect x="70" y="158" width="720" height="150" rx="12" fill="#14181d" stroke="#262c34"/>
  <text x="88" y="188" font-size="14.5" fill="#e8ecf1">You were reading “How Microsoft Recall stores screenshots” on Ars</text>
  <text x="88" y="210" font-size="14.5" fill="#e8ecf1">Technica in Firefox.</text>
  <text x="88" y="234" font-size="11.5" fill="#8a94a3">answered by qwen2.5:3b-instruct · running locally</text>

  <line x1="88" y1="250" x2="772" y2="250" stroke="#262c34" stroke-dasharray="3 3"/>
  <text x="88" y="272" font-size="11" letter-spacing="1.2" fill="#8a94a3">EVIDENCE · 1 MATCHING MEMORY</text>

  <!-- evidence row -->
  <rect x="88" y="282" width="3" height="18" rx="2" fill="#37d39b"/>
  <text x="104" y="296" font-size="13.5" fill="#e8ecf1">🌐 How Microsoft Recall stores screenshots — Ars Technica</text>
  <rect x="690" y="286" width="46" height="6" rx="3" fill="#1b2027"/>
  <rect x="690" y="286" width="33" height="6" rx="3" fill="url(#bar)"/>
  <text x="744" y="292" font-size="11" fill="#8a94a3">72%</text>

  <!-- composer -->
  <rect x="28" y="470" width="640" height="46" rx="12" fill="#14181d" stroke="#262c34"/>
  <text x="48" y="498" font-size="14" fill="#5b6470">Ask about anything you've done on this machine…</text>
  <rect x="680" y="470" width="112" height="46" rx="12" fill="url(#brand)"/>
  <text x="712" y="498" font-size="15" font-weight="600" fill="#ffffff">Recall</text>

  <!-- footer caption -->
  <text x="28" y="440" font-size="12" fill="#8a94a3">Embeddings, storage, search &amp; the language model all run on localhost — turn off Wi-Fi and it still answers.</text>
</svg>
